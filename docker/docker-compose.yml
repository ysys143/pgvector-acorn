name: pg_acorn_bench

services:
  postgres:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bench
    ports:
      - "5432:5432"
    volumes:
      - ..:/workspace
      - pgdata:/var/lib/postgresql/data
      - ../docker/bench-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 15
    entrypoint:
      - bash
      - -c
      - |
        cd /workspace &&
        make PG_CONFIG=$$PG_CONFIG install &&
        exec docker-entrypoint.sh postgres -c shared_preload_libraries=pg_acorn

  qdrant:
    image: qdrant/qdrant:v1.16.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  bench:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ..:/workspace
    working_dir: /workspace
    command: >
      python3 bench/run_bench.py
        --dsn "postgresql://postgres:postgres@postgres/bench"
        --scenario ${BENCH_SCENARIO:-all}
        --output bench/results.json
    profiles:
      - bench

volumes:
  pgdata: {}
  qdrant_storage: {}
